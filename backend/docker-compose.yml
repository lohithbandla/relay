version: "3.9"

services:
  postgres:
    image: postgres:16-alpine
    container_name: relay_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: chatuser
      POSTGRES_PASSWORD: chatpassword
      POSTGRES_DB: chatdb
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - relay_network
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U chatuser -d chatdb" ]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: relay_redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - relay_network
    healthcheck:
      test: [ "CMD", "redis-cli", "ping" ]
      interval: 10s
      timeout: 5s
      retries: 5

  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: relay_app
    restart: unless-stopped
    ports:
      - "7777:7777"
    environment:
      APP_PORT: 7777
      APP_ENV: production
      DB_HOST: postgres # container name = hostname inside Docker network
      DB_PORT: 5432
      DB_USER: chatuser
      DB_PASSWORD: chatpassword
      DB_NAME: chatdb
      DB_SSLMODE: disable
      REDIS_HOST: redis # container name = hostname inside Docker network
      REDIS_PORT: 6379
      REDIS_PASSWORD: ""
      JWT_SECRET: your-super-secret-key-change-in-production
      JWT_EXPIRY_HOURS: 72
    depends_on:
      postgres:
        condition: service_healthy # wait for postgres to be ready
      redis:
        condition: service_healthy # wait for redis to be ready
    networks:
      - relay_network

volumes:
  postgres_data:
  redis_data:

networks:
  relay_network:
    driver: bridge
